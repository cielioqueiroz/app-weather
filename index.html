<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/cloud.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <title>Clima Tempo</title>
</head>
<body>
    <div class="theme-toggle">
        <button id="themeToggle" class="theme-btn" title="Alternar tema">
            <ion-icon name="moon-outline"></ion-icon>
        </button>
    </div>

    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
        <p>Carregando informações climáticas...</p>
    </div>

    <div class="container">
        <div class="card">
            <h1>Clima Tempo</h1>

            <div class="search_section">
                <div class="geolocation-icon">
                    <ion-icon name="location-outline"></ion-icon>
                </div>
                <input id="location" type="text" placeholder="Digite aqui a localização (cidade ou País)">
                <div id="citySuggestionsDropdown" class="suggestions-dropdown"></div>
                <button id="search" class="search-button" title="Pesquisar">
                    <ion-icon name="search-outline"></ion-icon>
                </button>
            </div>

            <div class="weather_info">
                <div class="current-weather-container">
                    <!-- Bloco 1: Ícone do Clima -->
                    <div class="weather-block weather-icon-block">
                        <img id="weatherImage" src="./img/clear.png" alt="imagem representando o clima">
                    </div>

                    <!-- Bloco 2: Temperatura Principal -->
                    <div class="weather-block weather-temperature-block">
                        <h2 id="temperature">22 °C</h2>
                    </div>

                    <!-- Bloco 3: Detalhes (Localização, Descrição, Min/Max) -->
                    <div class="weather-block weather-details-block">
                        <p id="cityName" class="weather-location">Nome da Cidade</p>
                        <span id="weatherStatus" class="weather-description">Status do clima</span>
                        <div class="temp-minmax-section">
                            <div class="temp-item-main">
                                <span class="temp-label-main">MÍN.</span>
                                <span id="tempMin" class="temp-value-main">--°</span>
                            </div>
                            <div class="temp-item-main">
                                <span class="temp-label-main">MÁX.</span>
                                <span id="tempMax" class="temp-value-main">--°</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="sunriseSunset" class="sunrise-sunset-row"></div>

                <div class="details-grid">
                    <div id="feelsLike" class="detail-card">
                        <div class="info-icon">
                            <ion-icon name="thermometer-outline"></ion-icon>
                        </div>
                        <div class="info-label">Sensação Térmica</div>
                        <div class="info-value"></div>
                    </div>
                    <div id="humidity" class="detail-card">
                        <div class="info-icon">
                            <ion-icon name="water-outline"></ion-icon>
                        </div>
                        <div class="info-label">Umidade</div>
                        <div class="info-value"></div>
                    </div>
                    <div id="windSpeed" class="detail-card">
                        <div class="info-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
                                <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                            </svg>
                        </div>
                        <div class="info-label">Velocidade do Vento</div>
                        <div class="wind-info-container">
                            <div class="info-value"></div>
                            <div class="wind-direction" id="windDirection"></div>
                        </div>
                    </div>
                    <div id="rainChance" class="detail-card">
                        <div class="info-icon">
                            <ion-icon name="rainy-outline"></ion-icon>
                        </div>
                        <div class="info-label">Chuva</div>
                        <div class="info-value"></div>
                    </div>
                    <div id="uvCard" class="detail-card">
                        <div class="info-icon">
                            <ion-icon name="sunny-outline"></ion-icon>
                        </div>
                        <div class="info-label">Índice UV</div>
                        <div class="info-value" id="uvValue">--</div>
                    </div>
                    <div id="aqiCard" class="detail-card">
                        <div class="info-icon">
                            <ion-icon name="leaf-outline"></ion-icon>
                        </div>
                        <div class="info-label">Qualidade do Ar</div>
                        <div class="info-value" id="aqiValue">--</div>
                    </div>
                    <div id="visibilityCard" class="detail-card">
                        <div class="info-icon">
                            <ion-icon name="eye-outline"></ion-icon>
                        </div>
                        <div class="info-label">Visibilidade</div>
                        <div class="info-value" id="visibilityValue">--</div>
                    </div>
                    <div id="pressureCard" class="detail-card">
                        <div class="info-icon">
                            <ion-icon name="speedometer-outline"></ion-icon>
                        </div>
                        <div class="info-label">Pressão</div>
                        <div class="info-value" id="pressureValue">--</div>
                    </div>
                </div>

                <div class="hourly-forecast">
                    <div class="forecast-tabs">
                        <button class="tab-btn active" data-tab="hoje">Hoje</button>
                        <button class="tab-btn" data-tab="proximos">Próximos Dias</button>
                    </div>
                    <div id="tabHoje" class="tab-panel active">
                        <div class="hourly-grid" id="hourlyGrid"></div>
                    </div>
                    <div id="tabProximos" class="tab-panel hidden">
                        <div class="daily-forecast-list" id="dailyForecastList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2024 Clima Tempo🌥️. Todos os direitos reservados.</p>
    </footer>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@2.3.0/build/global/luxon.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
